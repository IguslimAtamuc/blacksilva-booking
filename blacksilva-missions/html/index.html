<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackSilva Missions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    :root { --panel-right: 9vw; }
    body {
      background: transparent;
      color: #f2f2f4;
      font-family: 'Oswald', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      display: none;
      user-select: none;
    }

    /* vignette usor, fara dreptunghi negru (fundalul e blurat din joc prin DOF) */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(130% 100% at 32% 50%, transparent 0%, transparent 52%, rgba(0,0,0,.32) 82%, rgba(0,0,0,.5) 100%);
      animation: fade .8s ease forwards;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    .letterbox-top, .letterbox-bottom {
      position: fixed; left: 0; right: 0; height: 0; background: #000; z-index: 2;
      pointer-events: none; transition: height 1s cubic-bezier(.4,0,.2,1);
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }
    .letterbox-top.active, .letterbox-bottom.active { height: 50px; }

    /* ancora panoului - pozitionabila din Config.PanelRight */
    .panel-anchor {
      position: fixed; top: 50%; right: var(--panel-right, 9vw); transform: translateY(-50%);
      z-index: 10; width: min(440px, 40vw);
    }

    /* ====================== DESIGN PANOU ====================== */
    .dt-wrap {
      --accent: #E8930C;
      --line: rgba(255,255,255,.07);
      --muted: rgba(255,255,255,.42);
      --text: #f3f3f5;
      --card: rgba(255,255,255,.03);
      --accent-soft: color-mix(in srgb, var(--accent) 16%, transparent);
      --accent-line: color-mix(in srgb, var(--accent) 38%, transparent);
      --accent-glow: color-mix(in srgb, var(--accent) 45%, transparent);
      --green: #34d27b;
      --pad: 20px; --gap: 10px; --cardpad: 14px;
      width: 100%;
      color: var(--text);
      /* fundal translucid (FARA backdrop-filter ca sa nu apara box negru in CEF) */
      background: linear-gradient(168deg, rgba(19,19,24,.80), rgba(10,10,13,.86));
      border: .5px solid rgba(255,255,255,.10);
      border-radius: 16px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,.75);
      overflow: hidden; position: relative;
      animation: panelIn .45s cubic-bezier(.16,1,.3,1);
    }
    @keyframes panelIn { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: none; } }
    .dt-wrap::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .7;
    }

    /* Header */
    .dt-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: var(--pad) var(--pad) 14px; }
    .dt-head-l { display: flex; align-items: center; gap: 12px; }
    .dt-badge { width: 40px; height: 40px; flex: none; display: grid; place-items: center; border-radius: 10px;
      color: var(--accent); background: var(--accent-soft); border: .5px solid var(--accent-line);
      box-shadow: 0 0 24px -8px var(--accent-glow) inset; }
    .dt-title { font-weight: 600; font-size: 21px; letter-spacing: .04em; text-transform: uppercase; line-height: 1; }
    .dt-sub { font-weight: 400; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-top: 5px; white-space: nowrap; }
    .dt-chip { display: flex; align-items: center; gap: 7px; flex: none; padding: 7px 11px; border-radius: 9px; background: rgba(0,0,0,.30); border: .5px solid var(--line); }
    .dt-chip svg { color: var(--accent); }
    .dt-chip-lbl { font-size: 9.5px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; line-height: 1; white-space: nowrap; }
    .dt-chip-val { font-size: 15px; font-weight: 600; letter-spacing: .05em; font-variant-numeric: tabular-nums; line-height: 1; margin-top: 3px; }

    /* Strip progres total */
    .dt-level { display: flex; align-items: center; gap: 13px; margin: 0 var(--pad); padding: 13px 15px; border-radius: 12px; background: rgba(0,0,0,.24); border: .5px solid var(--line); }
    .dt-lvl-num { position: relative; width: 46px; height: 46px; flex: none; display: grid; place-items: center; }
    .dt-lvl-num .lv { font-size: 17px; font-weight: 700; line-height: 1; }
    .dt-lvl-num .lv-lbl { position: absolute; bottom: -2px; font-size: 7px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; }
    .dt-lvl-num svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .dt-lvl-mid { flex: 1; min-width: 0; }
    .dt-lvl-rank { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 7px; }
    .dt-lvl-rank b { font-size: 14px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; }
    .dt-lvl-xp { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; letter-spacing: .03em; white-space: nowrap; }
    .dt-lvl-xp .cur { color: var(--accent); font-weight: 600; }
    .dt-bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,.07); overflow: hidden; }
    .dt-bar > i { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, color-mix(in srgb,var(--accent) 70%,#fff), var(--accent));
      box-shadow: 0 0 12px -2px var(--accent-glow); transition: width .7s cubic-bezier(.2,.8,.25,1); }

    /* Tabs */
    .dt-tabs { display: flex; gap: 0; margin: 14px var(--pad) 0; border-bottom: .5px solid var(--line); }
    .dt-tab { appearance: none; background: none; border: 0; cursor: pointer; position: relative; padding: 9px 2px; margin-right: 24px;
      color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      transition: color .18s; display: flex; align-items: center; gap: 7px; }
    .dt-tab:hover { color: rgba(255,255,255,.7); }
    .dt-tab.on { color: var(--text); }
    .dt-tab.on::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    .dt-tab .cnt { font-size: 10px; padding: 2px 6px; border-radius: 99px; line-height: 1; background: rgba(255,255,255,.08); color: var(--muted); font-weight: 600; }
    .dt-tab.on .cnt { background: var(--accent-soft); color: var(--accent); }

    /* Difficulty chip */
    .dt-diff { font-size: 9.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 7px; border-radius: 6px; }
    .diff-EASY    { color: #34d27b; background: rgba(52,210,123,.14); }
    .diff-MEDIUM  { color: #eab308; background: rgba(234,179,8,.14); }
    .diff-HARD    { color: #f59e0b; background: rgba(245,158,11,.16); }
    .diff-ILLEGAL { color: #ef4444; background: rgba(239,68,68,.16); }

    /* Activity buttons */
    .btn-start  { width: 100%; padding: 11px 14px; font-size: 12px; background: var(--accent); color: #1a1205; box-shadow: 0 8px 22px -10px var(--accent-glow); }
    .btn-start:hover { filter: brightness(1.08); }
    .btn-cancel { width: 100%; padding: 11px 14px; font-size: 12px; background: rgba(239,68,68,.12); color: #f87171; border: .5px solid rgba(239,68,68,.3); }
    .btn-cancel:hover { background: rgba(239,68,68,.2); }
    .btn-cool   { width: 100%; padding: 11px 14px; font-size: 12px; background: rgba(255,255,255,.05); color: var(--muted); cursor: default; }
    .dt-status.active { color: var(--accent); }
    .dt-status.cool   { color: rgba(255,255,255,.4); }

    /* Lista */
    .dt-list { display: flex; flex-direction: column; gap: var(--gap); padding: 16px var(--pad); max-height: 52vh; overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.14) transparent; }
    .dt-list::-webkit-scrollbar { width: 8px; }
    .dt-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }

    /* Card */
    .dt-card { position: relative; border-radius: 12px; background: var(--card); border: .5px solid var(--line); overflow: hidden; transition: border-color .2s, background .2s; }
    .dt-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity .2s; }
    .dt-card:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.13); }
    .dt-card:hover::before { opacity: .55; }
    .dt-card.open { border-color: var(--accent-line); background: rgba(255,255,255,.045); }
    .dt-card.open::before { opacity: 1; }
    .dt-card.claimed { opacity: .6; }
    .dt-card.locked { opacity: .5; }
    .dt-card.locked .dt-row { cursor: default; }
    .dt-card.claimable { border-color: var(--accent-line); box-shadow: 0 0 0 1px var(--accent-soft), 0 0 30px -14px var(--accent-glow); }

    .dt-row { display: flex; align-items: center; gap: 13px; padding: var(--cardpad); cursor: pointer; user-select: none; }
    .dt-ico { width: 42px; height: 42px; flex: none; display: grid; place-items: center; border-radius: 10px;
      background: rgba(255,255,255,.05); border: .5px solid var(--line); color: rgba(255,255,255,.85); transition: .2s; }
    .dt-card:hover .dt-ico, .dt-card.open .dt-ico { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
    .dt-card.locked .dt-ico { color: rgba(255,255,255,.4); }
    .dt-card.claimed .dt-ico { color: var(--green); border-color: rgba(52,210,123,.3); background: rgba(52,210,123,.1); }

    .dt-info { flex: 1; min-width: 0; }
    .dt-name { font-size: 15px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; line-height: 1.15; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .dt-num { font-size: 10px; font-weight: 700; color: var(--muted); background: rgba(255,255,255,.06); border-radius: 6px; padding: 2px 6px; letter-spacing: .04em; }
    .dt-meta { display: flex; align-items: center; gap: 9px; }
    .dt-status { display: flex; align-items: center; gap: 6px; font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .dt-dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor; }
    .dt-status.low { color: #ef4444; }
    .dt-status.mid { color: #eab308; }
    .dt-status.claimable { color: var(--accent); }
    .dt-status.comp { color: var(--green); }
    .dt-status.locked { color: rgba(255,255,255,.4); }
    .dt-minibar { flex: 1; max-width: 120px; height: 4px; border-radius: 99px; background: rgba(255,255,255,.08); overflow: hidden; }
    .dt-minibar > i { display: block; height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.2,.8,.25,1), background .3s; }

    /* Cluster dreapta */
    .dt-right { display: flex; align-items: center; gap: 13px; flex: none; }
    .dt-ring { position: relative; width: 44px; height: 44px; flex: none; display: grid; place-items: center; }
    .dt-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .dt-ring .frac { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: .02em; }
    .dt-reward { text-align: right; min-width: 64px; white-space: nowrap; }
    .dt-reward .xp { font-size: 15px; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: .02em; font-variant-numeric: tabular-nums; }
    .dt-reward .xp-lbl { font-size: 9px; letter-spacing: .16em; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
    .dt-card.claimed .dt-reward .xp { color: var(--green); }
    /* puls pe cardurile de revendicat */
    @keyframes dt-pulse { 0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); } 50% { box-shadow: 0 0 0 6px transparent; } }
    .dt-card.claimable .dt-ring::after { content: ""; position: absolute; inset: -3px; border-radius: 99px; animation: dt-pulse 1.8s ease-in-out infinite; }

    /* Expand */
    .dt-exp { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .32s cubic-bezier(.3,.8,.3,1); }
    .dt-card.open .dt-exp { grid-template-rows: 1fr; }
    .dt-exp-in { overflow: hidden; }
    .dt-exp-pad { padding: 0 var(--cardpad) var(--cardpad); border-top: .5px solid var(--line); margin-top: 2px; padding-top: 13px; }
    .dt-desc { font-size: 13px; line-height: 1.5; color: rgba(255,255,255,.62); letter-spacing: .01em; font-weight: 400; margin-bottom: 13px; }
    .dt-foot-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .dt-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .dt-tag b { color: var(--accent); font-weight: 700; }
    .dt-locknote { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: .03em; }
    .dt-locknote svg { color: var(--muted); }

    /* Butoane */
    .btn { appearance: none; font-family: inherit; cursor: pointer; border: 0; border-radius: 9px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; transition: .16s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-claim { width: 100%; padding: 11px 14px; font-size: 12px; background: var(--accent); color: #1a1205; box-shadow: 0 8px 22px -10px var(--accent-glow); }
    .btn-claim:hover { filter: brightness(1.08); }
    .btn-claimed { width: 100%; padding: 11px 14px; font-size: 12px; background: rgba(52,210,123,.12); color: var(--green); border: .5px solid rgba(52,210,123,.3); cursor: default; }

    /* Footer */
    .dt-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px var(--pad) var(--pad); border-top: .5px solid var(--line); background: rgba(0,0,0,.20); }
    .dt-foot-l { font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .dt-foot-l b { color: var(--text); font-weight: 600; }
    .dt-foot-txt { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .03em; font-variant-numeric: tabular-nums; }
    .btn-claimall { padding: 10px 16px; font-size: 12px; background: var(--accent); color: #1a1205; box-shadow: 0 10px 26px -12px var(--accent-glow); white-space: nowrap; }
    .btn-claimall:hover { filter: brightness(1.08); }

    /* Hint */
    .hint { position: fixed; bottom: 16px; right: var(--panel-right, 9vw); font-size: 11px; color: rgba(255,255,255,.35); letter-spacing: .5px; z-index: 11; }
    .hint kbd { background: rgba(255,255,255,.08); border: .5px solid rgba(255,255,255,.14); border-radius: 5px; padding: 3px 7px; font-family: 'Oswald', sans-serif; font-size: 10px; }

    /* Toast (doar in meniu, la revendicare) */
    .toasts { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 50; pointer-events: none; align-items: center; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 11px; background: rgba(15,15,18,.95); border: .5px solid rgba(52,210,123,.4);
      box-shadow: 0 16px 40px -12px rgba(0,0,0,.7); font-size: 13px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; animation: toastIn .35s cubic-bezier(.2,.9,.3,1); }
    .toast .tag { color: var(--green); font-weight: 700; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(14px) scale(.96); } to { opacity: 1; transform: none; } }
    .toast.out { animation: toastOut .3s ease forwards; }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-8px); } }
  </style>
</head>

<body>
  <div class="letterbox-top" id="lb-top"></div>
  <div class="letterbox-bottom" id="lb-bottom"></div>
  <div class="vignette" id="vignette"></div>

  <div class="panel-anchor">
    <div class="dt-wrap" id="wrap">
      <div class="dt-head">
        <div class="dt-head-l">
          <div class="dt-badge" id="badge"></div>
          <div>
            <div class="dt-title">Misiuni</div>
            <div class="dt-sub">Completeaza pe rand · bani &amp; experienta</div>
          </div>
        </div>
        <div class="dt-chip">
          <span id="chip-ico"></span>
          <div>
            <div class="dt-chip-lbl" id="chip-lbl">Completate</div>
            <div class="dt-chip-val" id="chip-val">0 / 0</div>
          </div>
        </div>
      </div>

      <div class="dt-level">
        <div class="dt-lvl-num" id="lvl-ring"></div>
        <div class="dt-lvl-mid">
          <div class="dt-lvl-rank">
            <b id="lvl-rank">Progres Total</b>
            <span class="dt-lvl-xp"><span class="cur" id="ov-done">0</span> / <span id="ov-total">0</span> <span id="ov-unit">misiuni</span></span>
          </div>
          <div class="dt-bar"><i id="ov-bar" style="width:0%"></i></div>
        </div>
      </div>

      <div class="dt-tabs">
        <button class="dt-tab on" id="tab-missions" data-tab="missions">Misiuni <span class="cnt" id="cnt-missions">0</span></button>
        <button class="dt-tab" id="tab-activities" data-tab="activities">Activitati <span class="cnt" id="cnt-activities">0</span></button>
      </div>

      <div class="dt-list" id="list"></div>

      <div class="dt-foot">
        <div class="dt-foot-l"><b id="f-done">0</b> / <span id="f-total">0</span> completate</div>
        <div id="f-action"></div>
      </div>
    </div>
  </div>

  <div class="hint"><kbd>ESC</kbd> pentru a inchide</div>
  <div class="toasts" id="toasts"></div>

  <script>
    /* ---------- Icoane (line SVG) ---------- */
    function svg(inner, size) {
      size = size || 20;
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
    }
    const ICONS = {
      grid:   '<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
      bottle: '<path d="M10 2h4"/><path d="M10 2v3l-1.5 2.5A4 4 0 0 0 8 9.5V20a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V9.5a4 4 0 0 0-.5-2L14 5V2"/><path d="M8 13h8"/>',
      car:    '<path d="M3 13l2-5h14l2 5"/><path d="M2 13h20v4H2z"/><circle cx="7" cy="17" r="1.6"/><circle cx="17" cy="17" r="1.6"/>',
      map:    '<path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2z"/><path d="M9 3v16M15 5v16"/>',
      camera: '<path d="M3 8h3l2-2h8l2 2h3v11H3z"/><circle cx="12" cy="13" r="3.5"/>',
      gun:    '<path d="M3 7h13l2 3h3v2h-3l-2 2v3h-4v-3H8l-1 2H4v-3l-1-1V7z"/><path d="M8 7V5"/>',
      wrench: '<path d="M14.5 6.5a4 4 0 0 0-5 5L3 18l3 3 6.5-6.5a4 4 0 0 0 5-5l-2.5 2.5-2.5-.5-.5-2.5 2.5-2.5z"/>',
      flag:   '<path d="M5 21V4M5 4h11l-2 4 2 4H5"/>',
      skull:  '<path d="M12 2a8 8 0 0 0-5 14v3h10v-3a8 8 0 0 0-5-14z"/><circle cx="9" cy="11" r="1.4"/><circle cx="15" cy="11" r="1.4"/><path d="M11 17h2"/>',
      target: '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/>',
      box:    '<path d="M21 8 12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8M12 13v8"/>',
      bolt:   '<path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/>',
      check:  '<path d="M4 12.5 9 17.5 20 6.5"/>',
      lock:   '<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',
      coins:  '<ellipse cx="9" cy="6" rx="6" ry="2.6"/><path d="M3 6v5c0 1.4 2.7 2.6 6 2.6s6-1.2 6-2.6V6"/><path d="M9 13.6v4c0 1.4 2.7 2.6 6 2.6s6-1.2 6-2.6v-6"/><ellipse cx="15" cy="11.6" rx="6" ry="2.6"/>',
      trophy: '<path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3"/><path d="M9 17h6M10 21h4M12 13v4"/>',
    };
    function icon(name, size) { return svg(ICONS[name] || ICONS.target, size); }

    /* ---------- Stare ---------- */
    let missions = [];
    let activities = [];
    let activeTab = 'missions';
    let activeActivityId = null;
    let openId = null;
    let openAct = null;
    let cdTimer = null;

    const fmt = (n) => '$' + (n || 0).toLocaleString('en-US');
    const mmss = (s) => { s = Math.max(0, s | 0); const m = Math.floor(s / 60), x = s % 60; return (m < 10 ? '0' : '') + m + ':' + (x < 10 ? '0' : '') + x; };

    function colorFor(pct, completed) {
      if (completed || pct >= 100) return '#34d27b';
      if (pct >= 50) return '#eab308';
      return '#ef4444';
    }
    function statusFor(m, pct) {
      if (m.locked) return { t: 'Blocat', c: 'locked', dot: false };
      if (m.completed && !m.claimed) return { t: 'De revendicat', c: 'claimable', dot: true };
      if (m.claimed) return { t: 'Revendicat', c: 'comp', dot: true };
      if (pct >= 50) return { t: 'In progres', c: 'mid', dot: true };
      return { t: 'Inceput', c: 'low', dot: true };
    }
    function ringSvg(pct, color, size, stroke) {
      size = size || 44; stroke = stroke || 4;
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const off = c * (1 - Math.min(1, pct / 100));
      return '<svg width="' + size + '" height="' + size + '">' +
        '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="' + stroke + '"/>' +
        '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" style="transition:stroke-dashoffset .6s cubic-bezier(.2,.8,.25,1)"/>' +
        '</svg>';
    }

    /* ---------- Dispatch ---------- */
    function render() {
      document.getElementById('badge').innerHTML = icon('grid', 20);
      document.getElementById('chip-ico').innerHTML = icon('trophy', 16);
      document.getElementById('cnt-missions').textContent = missions.length;
      document.getElementById('cnt-activities').textContent = activities.length;
      document.getElementById('tab-missions').classList.toggle('on', activeTab === 'missions');
      document.getElementById('tab-activities').classList.toggle('on', activeTab === 'activities');
      if (activeTab === 'activities') renderActivities(); else renderMissions();
    }

    /* ---------- MISIUNI ---------- */
    function renderMissions() {
      const total = missions.length;
      let done = 0, claimableSum = 0, claimableN = 0;
      missions.forEach(m => { if (m.completed) done++; if (m.completed && !m.claimed) { claimableSum += (m.reward || 0); claimableN++; } });

      document.getElementById('chip-lbl').textContent = 'Completate';
      document.getElementById('chip-val').textContent = done + ' / ' + total;
      document.getElementById('lvl-rank').textContent = 'Progres Misiuni';
      document.getElementById('ov-done').textContent = done;
      document.getElementById('ov-total').textContent = total;
      document.getElementById('ov-unit').textContent = 'misiuni';
      const ovPct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('ov-bar').style.width = ovPct + '%';
      const allDone = total && done === total;
      document.getElementById('lvl-ring').innerHTML = ringSvg(ovPct, allDone ? '#34d27b' : 'var(--accent)', 46, 3.5) + '<span class="lv">' + done + '</span><span class="lv-lbl">DONE</span>';
      document.getElementById('f-done').textContent = done;
      document.getElementById('f-total').textContent = total;

      const fa = document.getElementById('f-action');
      if (claimableN > 0) {
        fa.innerHTML = '<button class="btn btn-claimall" id="claim-all">' + icon('coins', 15) + ' Revendica tot · ' + fmt(claimableSum) + '</button>';
        fa.querySelector('#claim-all').addEventListener('click', () => fetch('https://blacksilva-missions/claimAll', { method: 'POST', body: '{}' }));
      } else {
        fa.innerHTML = '<span class="dt-foot-txt">Nimic de revendicat</span>';
      }

      const list = document.getElementById('list');
      list.innerHTML = '';
      missions.forEach(m => {
        const target = m.target || 1;
        const current = Math.min(m.current || 0, target);
        const pct = m.completed ? 100 : Math.round((current / target) * 100);
        const col = colorFor(pct, m.completed);
        const st = statusFor(m, pct);
        const claimable = m.completed && !m.claimed && !m.locked;
        const isOpen = openId === m.id && !m.locked;
        const cls = ['dt-card', isOpen && 'open', claimable && 'claimable', m.claimed && 'claimed', m.locked && 'locked'].filter(Boolean).join(' ');

        let ringInner;
        if (m.locked) ringInner = '<span class="frac" style="color:rgba(255,255,255,.4)">' + icon('lock', 16) + '</span>';
        else if (m.completed) ringInner = ringSvg(100, '#34d27b') + '<span class="frac" style="color:#34d27b">' + icon('check', 16) + '</span>';
        else { const fracTxt = target > 50 ? pct + '%' : current + '/' + target; ringInner = ringSvg(pct, col) + '<span class="frac">' + fracTxt + '</span>'; }

        let expContent;
        if (m.locked) {
          const prev = missions.find(x => x.id === m.id - 1);
          expContent = '<div class="dt-locknote">' + icon('lock', 14) + ' Completeaza intai misiunea #' + (m.id - 1) + (prev ? ' (' + prev.title + ')' : '') + '</div>';
        } else if (claimable) {
          expContent = '<button class="btn btn-claim" data-claim="' + m.id + '">' + icon('coins', 15) + ' Revendica ' + fmt(m.reward) + ' · +' + (m.level || 1) + ' nivel</button>';
        } else if (m.claimed) {
          expContent = '<span class="btn btn-claimed">' + icon('check', 15) + ' Recompensa revendicata</span>';
        } else {
          expContent = '<div class="dt-foot-row"><span class="dt-tag">' + icon('coins', 14) + ' Recompensa <b>' + fmt(m.reward) + '</b></span><span class="dt-tag">' + icon('trophy', 14) + ' <b>+' + (m.level || 1) + '</b> nivel</span></div>';
        }

        const card = document.createElement('div');
        card.className = cls;
        card.innerHTML =
          '<div class="dt-row" data-id="' + m.id + '">' +
            '<div class="dt-ico">' + (m.locked ? icon('lock') : icon(m.icon)) + '</div>' +
            '<div class="dt-info">' +
              '<div class="dt-name"><span class="dt-num">#' + m.id + '</span>' + m.title + '</div>' +
              '<div class="dt-meta"><span class="dt-status ' + st.c + '">' + (st.dot ? '<span class="dt-dot"></span>' : '') + st.t + '</span>' +
              '<span class="dt-minibar"><i style="width:' + pct + '%;background:' + col + '"></i></span></div>' +
            '</div>' +
            '<div class="dt-right"><div class="dt-ring">' + ringInner + '</div>' +
              '<div class="dt-reward"><div class="xp">' + fmt(m.reward) + '</div><div class="xp-lbl">recompensa</div></div></div>' +
          '</div>' +
          '<div class="dt-exp"><div class="dt-exp-in"><div class="dt-exp-pad"><div class="dt-desc">' + (m.description || '') + '</div>' + expContent + '</div></div></div>';
        list.appendChild(card);
      });

      list.querySelectorAll('.dt-row').forEach(row => row.addEventListener('click', () => {
        const id = parseInt(row.getAttribute('data-id'), 10);
        const m = missions.find(x => x.id === id);
        if (!m || m.locked) return;
        openId = (openId === id) ? null : id;
        renderMissions();
      }));
      list.querySelectorAll('[data-claim]').forEach(btn => btn.addEventListener('click', (e) => {
        e.stopPropagation();
        fetch('https://blacksilva-missions/claim', { method: 'POST', body: JSON.stringify({ id: parseInt(btn.getAttribute('data-claim'), 10) }) });
      }));
    }

    /* ---------- ACTIVITATI ---------- */
    function actStatus(a) {
      if (activeActivityId === a.id) return { t: 'In desfasurare', c: 'active', dot: true };
      if (a.state === 'completed') return { t: 'De revendicat', c: 'claimable', dot: true };
      if (a.state === 'cooldown') return { t: 'Cooldown ' + mmss(a.cooldownLeft), c: 'cool', dot: false };
      return { t: 'Disponibil', c: 'comp', dot: true };
    }
    function renderActivities() {
      const total = activities.length;
      let avail = 0, claimable = 0;
      activities.forEach(a => { if (activeActivityId !== a.id && a.state === 'available') avail++; if (a.state === 'completed') claimable++; });

      document.getElementById('chip-lbl').textContent = 'Disponibile';
      document.getElementById('chip-val').textContent = avail + ' / ' + total;
      document.getElementById('lvl-rank').textContent = 'Activitati';
      document.getElementById('ov-done').textContent = claimable;
      document.getElementById('ov-total').textContent = total;
      document.getElementById('ov-unit').textContent = 'de revendicat';
      const ovPct = total ? Math.round((claimable / total) * 100) : 0;
      document.getElementById('ov-bar').style.width = ovPct + '%';
      document.getElementById('lvl-ring').innerHTML = ringSvg(ovPct, 'var(--accent)', 46, 3.5) + '<span class="lv">' + claimable + '</span><span class="lv-lbl">$$$</span>';
      document.getElementById('f-done').textContent = avail;
      document.getElementById('f-total').textContent = total;

      const fa = document.getElementById('f-action');
      if (claimable > 0) {
        fa.innerHTML = '<button class="btn btn-claimall" id="claim-all-act">' + icon('coins', 15) + ' Revendica tot (' + claimable + ')</button>';
        fa.querySelector('#claim-all-act').addEventListener('click', () => {
          activities.forEach(a => { if (a.state === 'completed') fetch('https://blacksilva-missions/claimActivity', { method: 'POST', body: JSON.stringify({ id: a.id }) }); });
        });
      } else {
        fa.innerHTML = '<span class="dt-foot-txt">Incepe o activitate</span>';
      }

      const list = document.getElementById('list');
      list.innerHTML = '';
      activities.forEach(a => {
        const st = actStatus(a);
        const isActive = activeActivityId === a.id;
        const claimableC = a.state === 'completed';
        const isOpen = (openAct === a.id) || isActive;
        const cls = ['dt-card', isOpen && 'open', claimableC && 'claimable', a.state === 'cooldown' && 'claimed'].filter(Boolean).join(' ');

        let ringInner;
        if (claimableC) ringInner = ringSvg(100, '#34d27b') + '<span class="frac" style="color:#34d27b">' + icon('check', 16) + '</span>';
        else if (a.state === 'cooldown') ringInner = '<span class="frac" style="color:rgba(255,255,255,.4)">' + icon('clock', 16) + '</span>';
        else ringInner = '<span class="frac" style="color:var(--accent)">' + icon('bolt', 16) + '</span>';

        const rewXp = claimableC ? fmt(a.amount) : fmt(a.rewardMax);
        const rewLbl = claimableC ? 'recompensa' : 'pana la';

        let exp;
        if (isActive) exp = '<button class="btn btn-cancel" data-cancel="' + a.id + '">' + icon('flag', 15) + ' Renunta la activitate</button>';
        else if (claimableC) exp = '<button class="btn btn-claim" data-claimact="' + a.id + '">' + icon('coins', 15) + ' Revendica ' + fmt(a.amount) + ' · +' + (a.level || 1) + ' nivel</button>';
        else if (a.state === 'cooldown') exp = '<span class="btn btn-cool">' + icon('clock', 15) + ' Disponibil in ' + mmss(a.cooldownLeft) + '</span>';
        else exp = '<button class="btn btn-start" data-start="' + a.id + '">' + icon('bolt', 15) + ' Incepe activitatea</button>';

        const card = document.createElement('div');
        card.className = cls;
        card.innerHTML =
          '<div class="dt-row" data-act="' + a.id + '">' +
            '<div class="dt-ico">' + icon(a.icon) + '</div>' +
            '<div class="dt-info">' +
              '<div class="dt-name">' + a.title + ' <span class="dt-diff diff-' + a.difficulty + '">' + a.difficulty + '</span></div>' +
              '<div class="dt-meta"><span class="dt-status ' + st.c + '">' + (st.dot ? '<span class="dt-dot"></span>' : '') + st.t + '</span>' +
              '<span class="dt-status" style="color:rgba(255,255,255,.38)">· ' + a.steps + ' pasi</span></div>' +
            '</div>' +
            '<div class="dt-right"><div class="dt-ring">' + ringInner + '</div>' +
              '<div class="dt-reward"><div class="xp">' + rewXp + '</div><div class="xp-lbl">' + rewLbl + '</div></div></div>' +
          '</div>' +
          '<div class="dt-exp"><div class="dt-exp-in"><div class="dt-exp-pad"><div class="dt-desc">' + (a.description || '') + '</div>' +
            '<div class="dt-foot-row" style="margin-bottom:12px"><span class="dt-tag">' + icon('coins', 14) + ' <b>' + fmt(a.rewardMin) + ' - ' + fmt(a.rewardMax) + '</b></span><span class="dt-tag">' + icon('trophy', 14) + ' <b>+' + (a.level || 1) + '</b> nivel</span></div>' +
            exp +
          '</div></div></div>';
        list.appendChild(card);
      });

      list.querySelectorAll('.dt-row').forEach(row => row.addEventListener('click', () => {
        const id = parseInt(row.getAttribute('data-act'), 10);
        openAct = (openAct === id) ? null : id;
        renderActivities();
      }));
      list.querySelectorAll('[data-start]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); fetch('https://blacksilva-missions/startActivity', { method: 'POST', body: JSON.stringify({ id: parseInt(b.getAttribute('data-start'), 10) }) }); }));
      list.querySelectorAll('[data-cancel]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); fetch('https://blacksilva-missions/cancelActivity', { method: 'POST', body: '{}' }); }));
      list.querySelectorAll('[data-claimact]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); fetch('https://blacksilva-missions/claimActivity', { method: 'POST', body: JSON.stringify({ id: parseInt(b.getAttribute('data-claimact'), 10) }) }); }));
    }

    /* ---------- Tabs + cooldown timer ---------- */
    document.getElementById('tab-missions').addEventListener('click', () => { activeTab = 'missions'; render(); });
    document.getElementById('tab-activities').addEventListener('click', () => { activeTab = 'activities'; render(); });

    function startCdTimer() {
      if (cdTimer) clearInterval(cdTimer);
      cdTimer = setInterval(() => {
        let any = false;
        activities.forEach(a => { if (a.state === 'cooldown' && a.cooldownLeft > 0) { a.cooldownLeft--; if (a.cooldownLeft <= 0) a.state = 'available'; any = true; } });
        if (any && activeTab === 'activities') renderActivities();
      }, 1000);
    }
    function stopCdTimer() { if (cdTimer) { clearInterval(cdTimer); cdTimer = null; } }

    /* ---------- Toasts (revendicare) ---------- */
    function toast(tag, body) {
      const wrap = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      el.innerHTML = '<span class="tag">' + tag + '</span>' + body;
      wrap.appendChild(el);
      setTimeout(() => el.classList.add('out'), 3200);
      setTimeout(() => el.remove(), 3600);
    }

    /* ---------- Deschidere/inchidere ---------- */
    function openUI(accent, panelRight) {
      if (accent) document.getElementById('wrap').style.setProperty('--accent', accent);
      if (panelRight != null) document.documentElement.style.setProperty('--panel-right', panelRight + 'vw');
      document.body.style.display = 'block';
      document.getElementById('vignette').style.display = 'block';
      setTimeout(() => {
        document.getElementById('lb-top').classList.add('active');
        document.getElementById('lb-bottom').classList.add('active');
      }, 80);
    }
    function closeUI() {
      stopCdTimer();
      document.getElementById('lb-top').classList.remove('active');
      document.getElementById('lb-bottom').classList.remove('active');
      document.getElementById('vignette').style.display = 'none';
      document.body.style.display = 'none';
    }

    window.addEventListener('message', function (e) {
      const d = e.data;
      if (d.type === 'openUI') {
        missions = d.missions || [];
        activities = d.activities || [];
        activeActivityId = d.activeActivity || null;
        openId = null; openAct = null; activeTab = 'missions';
        render();
        openUI(d.accent, d.panelRight);
        startCdTimer();
      } else if (d.type === 'update') {
        missions = d.missions || [];
        activities = d.activities || [];
        if (d.activeActivity !== undefined) activeActivityId = d.activeActivity;
        const cur = missions.find(x => x.id === openId);
        if (!cur || cur.locked) openId = null;
        render();
      } else if (d.type === 'setActive') {
        activeActivityId = d.id || null;
        if (activeTab === 'activities') renderActivities();
      } else if (d.type === 'claimed') {
        let body = '';
        if (d.money) body += fmt(d.money);
        if (d.level) body += (body ? '  ·  ' : '') + '+' + d.level + ' nivel';
        toast('Revendicat', body || (d.label || ''));
      } else if (d.type === 'closeUI') {
        closeUI();
      }
    });

    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeUI();
        fetch('https://blacksilva-missions/close', { method: 'POST', body: '{}' });
      }
    });
  </script>
</body>

</html>
