<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Black Silva — Voices</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --display:'Cormorant Garamond',Georgia,serif; --body:'Manrope',system-ui,sans-serif;
    --bg:#0b0b0d; --card:#141417; --ink:#f4f2ee; --dim:rgba(244,242,238,.58); --line:rgba(255,255,255,.08);
    --gold:#d8b878; --pink:#ff2d8f; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ font-family:var(--body); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.5;
    background-image:radial-gradient(120% 80% at 50% -10%, #1a1a1f 0%, #0b0b0d 55%); }
  a{ color:inherit; }
  .wrap{ max-width:600px; margin:0 auto; padding:0 16px 100px; }

  .topbar{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 16px; margin:0 -16px 8px; background:rgba(11,11,13,.82); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); }
  .topbar .home{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); text-decoration:none; }
  .topbar .home:hover{ color:var(--ink); }
  .topbar .lock{ width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:transparent; color:var(--dim); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .topbar .lock.on{ color:var(--gold); border-color:var(--gold); }

  header.hero{ text-align:center; padding:34px 10px 22px; }
  header.hero .k{ font-size:10.5px; letter-spacing:.4em; text-transform:uppercase; color:var(--dim); }
  header.hero h1{ font-family:var(--display); font-weight:600; font-size:clamp(34px,9vw,52px); line-height:1; margin-top:8px; }
  .ratingline{ margin-top:14px; display:inline-flex; align-items:center; gap:10px; font-size:14px; color:var(--dim); }
  .ratingline .big{ font-family:var(--display); font-size:30px; color:var(--ink); font-weight:600; }
  .ratingline .st{ color:var(--gold); letter-spacing:2px; font-size:18px; }
  .devicenote{ margin:10px auto 0; max-width:440px; font-size:11.5px; color:rgba(244,242,238,.4); line-height:1.5; }

  .composer{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:20px; margin:14px 0 26px; box-shadow:0 24px 60px rgba(0,0,0,.4); }
  .composer h2{ font-family:var(--display); font-weight:600; font-size:24px; }
  .composer .sub{ color:var(--dim); font-size:13px; margin-top:4px; }
  .welcome{ display:none; margin-top:12px; padding:11px 14px; border-radius:12px; background:rgba(216,184,120,.12); border:1px solid rgba(216,184,120,.3); color:#e8d4a0; font-size:13px; }
  .welcome.on{ display:block; }
  .q{ margin-top:16px; }
  .q label{ display:block; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:7px; }
  .q label .n{ color:var(--gold); margin-right:7px; font-weight:700; }
  .q input, .q textarea{ width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink); font:inherit; font-size:15px; outline:none; resize:vertical; }
  .q input:focus, .q textarea:focus{ border-color:var(--gold); }
  .q textarea{ min-height:74px; }
  .two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stars-in{ display:flex; gap:6px; font-size:30px; color:rgba(255,255,255,.18); cursor:pointer; }
  .stars-in span{ transition:.12s; } .stars-in span.on{ color:var(--gold); transform:scale(1.05); }
  .yn{ display:flex; gap:10px; }
  .yn button{ flex:1; padding:12px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink); font:inherit; font-weight:600; cursor:pointer; }
  .yn button.on{ background:var(--gold); color:#1a1208; border-color:var(--gold); }
  .submit{ width:100%; margin-top:18px; padding:15px; border-radius:14px; border:none; background:var(--gold); color:#1a1208; font-weight:800; letter-spacing:.1em; text-transform:uppercase; font-size:12px; cursor:pointer; transition:.16s; }
  .submit:hover{ transform:translateY(-2px); box-shadow:0 14px 30px rgba(216,184,120,.25); }
  .formerr{ color:#ff8f85; font-size:12.5px; margin-top:10px; min-height:14px; }

  .feed-title{ font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); margin:6px 4px 14px; }
  .thread{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px 18px 8px; margin-bottom:18px; box-shadow:0 18px 50px rgba(0,0,0,.35); }
  .th-head{ display:flex; align-items:center; gap:13px; }
  .avatar{ width:46px; height:46px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:22px; font-weight:600; color:#1a1208; background:linear-gradient(140deg,#f0d9a8,var(--gold)); }
  .th-name{ font-weight:700; font-size:15px; }
  .th-meta{ font-size:11.5px; color:var(--dim); margin-top:1px; }
  .th-rating{ margin-left:auto; text-align:right; }
  .th-rating .st{ color:var(--gold); letter-spacing:1px; font-size:14px; }
  .th-rating small{ display:block; font-size:10.5px; color:var(--dim); }

  .timeline{ margin-top:14px; border-left:2px solid rgba(255,255,255,.07); padding-left:0; }
  .post{ position:relative; padding:0 0 16px 20px; margin-left:6px; border-left:2px solid transparent; }
  .post::before{ content:""; position:absolute; left:-7px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 4px var(--card); }
  .post.salon::before{ background:var(--pink); }
  .post .visit{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; }
  .post.salon .visit{ color:var(--pink); }
  .post .when{ font-size:11px; color:var(--dim); margin-left:8px; }
  .post .st{ color:var(--gold); font-size:13px; letter-spacing:1px; margin-top:3px; }
  .post .svc{ font-size:12.5px; color:var(--dim); margin-top:2px; }
  .post .body{ margin-top:7px; font-size:14px; color:#e7e4dd; }
  .post .body .lab{ color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.08em; display:block; margin-top:8px; }
  .post .compare{ margin-top:8px; padding:9px 12px; border-radius:10px; background:rgba(216,184,120,.1); border:1px solid rgba(216,184,120,.22); font-size:13px; }
  .post .rec{ display:inline-block; margin-top:8px; font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:3px 9px; border-radius:999px; }
  .post .rec.yes{ background:rgba(58,180,110,.16); color:#6fe0a0; } .post .rec.no{ background:rgba(255,90,90,.14); color:#ff9b8a; }
  .post.salon .body{ background:rgba(255,45,143,.07); border:1px solid rgba(255,45,143,.18); border-radius:12px; padding:10px 13px; margin-top:6px; }

  .th-actions{ display:flex; gap:10px; padding:6px 0 10px 6px; }
  .th-actions button{ font:inherit; font-size:12px; font-weight:600; padding:9px 14px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--dim); cursor:pointer; }
  .th-actions button:hover{ color:var(--ink); border-color:var(--ink); }
  .replybox{ display:none; gap:8px; padding:4px 0 14px; }
  .replybox.on{ display:flex; }
  .replybox input{ flex:1; padding:11px 13px; border-radius:11px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink); font:inherit; outline:none; }
  .replybox button{ padding:0 16px; border-radius:11px; border:none; background:var(--pink); color:#fff; font-weight:700; cursor:pointer; }
  .empty{ text-align:center; color:var(--dim); padding:30px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="index.html">‹ Back to salon</a>
    <span style="font-family:var(--display);font-size:18px;letter-spacing:.1em;">Voices</span>
    <button class="lock" id="lockBtn" title="Salon staff sign-in">🔒</button>
  </div>
  <div class="wrap">
    <header class="hero">
      <p class="k">Black Silva · Copenhagen</p>
      <h1>Voices of the chair</h1>
      <div class="ratingline" id="ratingLine"></div>
      <p class="devicenote" id="deviceNote"></p>
    </header>

    <div class="composer" id="composer">
      <h2 class="serif" style="font-family:var(--display)">Share your visit</h2>
      <p class="sub">Five quick questions. Come back after your next visit and add to the same thread — so others see how we hold the quality over time.</p>
      <div class="welcome" id="welcome"></div>

      <div class="two">
        <div class="q"><label>Your name</label><input id="f-name" type="text" placeholder="First name & initial" autocomplete="name"></div>
        <div class="q"><label>Email <span style="text-transform:none;letter-spacing:0">(keeps your thread)</span></label><input id="f-email" type="email" placeholder="you@email.com" autocomplete="email"></div>
      </div>

      <div class="two">
        <div class="q"><label><span class="n">1</span>What did you have done?</label><input id="f-service" type="text" placeholder="e.g. Skin fade, Ladies cut"></div>
        <div class="q"><label><span class="n">2</span>Who was your stylist?</label><input id="f-stylist" type="text" placeholder="Eduard / Elena"></div>
      </div>

      <div class="q"><label><span class="n">3</span>Rate the result</label><div class="stars-in" id="starsIn">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span></div></div>

      <div class="q"><label><span class="n">4</span>How was the experience — consultation, comfort, the vibe?</label><textarea id="f-exp" placeholder="Tell us how it felt…"></textarea></div>

      <div class="q" id="compareWrap" style="display:none"><label>Compared to your last visit?</label><textarea id="f-compare" placeholder="Was it better, sharper, just as good…?"></textarea></div>

      <div class="q"><label><span class="n">5</span>Would you come back &amp; recommend us?</label>
        <div class="yn" id="ynRec"><button data-v="yes">Yes, absolutely</button><button data-v="no">Not this time</button></div>
      </div>

      <div class="q"><label>In your own words (optional)</label><textarea id="f-text" placeholder="Anything else you'd tell a friend?"></textarea></div>

      <button class="submit" id="submitBtn">Post my review</button>
      <div class="formerr" id="formErr"></div>
    </div>

    <p class="feed-title">The thread · newest first</p>
    <div id="feed"></div>
  </div>

<script src="reviews.js"></script>
<script>
(function(){
  var R=window.BSReviews;
  var rating=0, recommend='', ownerMode=localStorage.getItem('bs_owner_ok')==='1', existingThread=null;
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function $(id){ return document.getElementById(id); }

  /* ---- rating + recommend inputs ---- */
  var starsIn=$('starsIn');
  starsIn.addEventListener('click',function(e){ var s=e.target.closest('span'); if(!s) return; rating=+s.getAttribute('data-v'); paintStars(); });
  starsIn.addEventListener('mousemove',function(e){ var s=e.target.closest('span'); if(!s) return; paintStars(+s.getAttribute('data-v')); });
  starsIn.addEventListener('mouseleave',function(){ paintStars(); });
  function paintStars(hover){ var v=hover||rating; [].forEach.call(starsIn.children,function(c,i){ c.classList.toggle('on', i<v); }); }
  $('ynRec').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b) return; recommend=b.getAttribute('data-v');
    [].forEach.call(this.children,function(c){ c.classList.toggle('on', c===b); }); });

  /* ---- returning guest: continue your thread ---- */
  $('f-email').addEventListener('blur',function(){ var v=this.value.trim(); if(v.indexOf('@')<1) return;
    R.findByEmail(v).then(function(th){ existingThread=th;
      var w=$('welcome'), cw=$('compareWrap');
      if(th){ var n=R.clientPosts(th).length; w.innerHTML='Welcome back, <b>'+esc(th.name)+'</b>! This will be visit <b>#'+(n+1)+'</b> on your thread.'; w.classList.add('on'); cw.style.display='block'; $('submitBtn').textContent='Add visit #'+(n+1)+' to my thread';
        if(!$('f-name').value) $('f-name').value=th.name; }
      else { w.classList.remove('on'); cw.style.display='none'; $('submitBtn').textContent='Post my review'; }
    }); });

  /* ---- submit ---- */
  $('submitBtn').addEventListener('click',function(){
    var err=$('formErr'); err.textContent='';
    var name=$('f-name').value.trim(), email=$('f-email').value.trim();
    if(name.length<2){ err.textContent='Please add your name.'; return; }
    if(email.indexOf('@')<1){ err.textContent='Please add the email you book with — it keeps your thread together.'; return; }
    if(!rating){ err.textContent='Please tap a star rating.'; return; }
    if(!$('f-exp').value.trim()){ err.textContent='Tell us a little about the experience.'; return; }
    var payload={ name:name, email:email, service:$('f-service').value.trim(), stylist:$('f-stylist').value.trim(),
      rating:rating, experience:$('f-exp').value.trim(), recommend:recommend||'yes', compare:$('f-compare').value.trim(), text:$('f-text').value.trim() };
    var btn=this; btn.disabled=true; btn.textContent='Posting…';
    R.add(payload).then(function(res){ btn.disabled=false;
      if(res && res.error){ err.textContent=res.error; btn.textContent='Post my review'; return; }
      /* reset */
      ['f-service','f-stylist','f-exp','f-compare','f-text'].forEach(function(id){ $(id).value=''; });
      rating=0; recommend=''; paintStars(); [].forEach.call($('ynRec').children,function(c){ c.classList.remove('on'); });
      btn.textContent='Posted ✓ thank you';
      render(); refreshSummary();
      setTimeout(function(){ btn.textContent= existingThread?('Add another visit'):'Post my review'; },1600);
      var fid=res.thread&&res.thread.id; setTimeout(function(){ var el=document.getElementById('th-'+fid); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },200);
    }).catch(function(){ btn.disabled=false; btn.textContent='Post my review'; err.textContent='Could not post — try again.'; });
  });

  /* ---- owner mode (reply as the salon) ---- */
  function paintLock(){ $('lockBtn').classList.toggle('on',ownerMode); $('lockBtn').textContent=ownerMode?'🔓':'🔒'; $('lockBtn').title=ownerMode?'Salon staff: signed in (tap to sign out)':'Salon staff sign-in'; }
  $('lockBtn').addEventListener('click',function(){
    if(ownerMode){ ownerMode=false; localStorage.removeItem('bs_owner_ok'); localStorage.removeItem('bs_owner_pass'); paintLock(); render(); return; }
    var p=prompt('Salon staff passcode (lets you reply as Black Silva):'); if(!p) return;
    localStorage.setItem('bs_owner_pass',p); ownerMode=true; localStorage.setItem('bs_owner_ok','1'); paintLock(); render();
  });
  paintLock();

  window.RV={
    addVisit:function(id){ var th=null; R.list().then(function(ts){ th=ts.filter(function(t){return t.id===id;})[0];
      if(th){ $('f-email').value=''; $('f-name').value=th.name; } });
      $('composer').scrollIntoView({behavior:'smooth',block:'start'}); $('f-email').focus();
    },
    toggleReply:function(id){ var b=document.getElementById('rb-'+id); if(b) b.classList.toggle('on'); },
    sendReply:function(id){ var inp=document.getElementById('ri-'+id); if(!inp) return; var t=inp.value.trim(); if(!t) return;
      R.reply(id,t,localStorage.getItem('bs_owner_pass')||'').then(function(res){ if(res&&res.error){ alert(res.error); return; } render(); });
    }
  };

  /* ---- render feed ---- */
  function postHTML(p){
    if(p.role==='salon'){
      return '<div class="post salon"><span class="visit">Black Silva replied</span><span class="when">'+R.timeAgo(p.ts)+'</span>'
        +'<div class="body">'+esc(p.text)+'</div></div>';
    }
    var h='<div class="post"><span class="visit">Visit '+(p.visit||1)+'</span><span class="when">'+R.timeAgo(p.ts)+'</span>';
    if(p.rating) h+='<div class="st">'+R.stars(p.rating)+'</div>';
    if(p.service||p.stylist) h+='<div class="svc">'+esc([p.service,p.stylist&&('with '+p.stylist)].filter(Boolean).join(' · '))+'</div>';
    h+='<div class="body">';
    if(p.compare) h+='<div class="compare"><b>Compared to last time:</b> '+esc(p.compare)+'</div>';
    if(p.experience) h+=esc(p.experience);
    if(p.text) h+='<span class="lab">In their words</span>'+esc(p.text);
    if(p.recommend) h+='<br><span class="rec '+(p.recommend==='no'?'no':'yes')+'">'+(p.recommend==='no'?'Would not return':'Recommends us')+'</span>';
    h+='</div></div>';
    return h;
  }
  function cardHTML(th){
    var a=R.avg(th), n=R.clientPosts(th).length;
    var since=new Date(th.created).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    var h='<div class="thread" id="th-'+th.id+'"><div class="th-head">'
      +'<div class="avatar">'+esc((th.name||'G').trim().charAt(0).toUpperCase())+'</div>'
      +'<div><div class="th-name">'+esc(th.name||'Guest')+'</div><div class="th-meta">'+n+' visit'+(n>1?'s':'')+' · guest since '+since+'</div></div>'
      +'<div class="th-rating"><div class="st">'+R.stars(a)+'</div><small>'+(a?a.toFixed(1):'—')+'</small></div></div>';
    h+='<div class="timeline">'+th.posts.map(postHTML).join('')+'</div>';
    h+='<div class="th-actions"><button onclick="RV.addVisit(\''+th.id+'\')">+ Add your visit</button>';
    if(ownerMode) h+='<button onclick="RV.toggleReply(\''+th.id+'\')">Reply as salon</button>';
    h+='</div>';
    if(ownerMode) h+='<div class="replybox" id="rb-'+th.id+'"><input id="ri-'+th.id+'" placeholder="Reply as Black Silva…"><button onclick="RV.sendReply(\''+th.id+'\')">Send</button></div>';
    h+='</div>';
    return h;
  }
  function render(){ R.list().then(function(ts){
    var f=$('feed');
    if(!ts.length){ f.innerHTML='<div class="empty">No reviews yet — be the first to share your visit.</div>'; return; }
    f.innerHTML=ts.map(cardHTML).join('');
  }); }
  function refreshSummary(){ R.summary().then(function(s){
    $('ratingLine').innerHTML='<span class="big">'+(s.avg?s.avg.toFixed(1):'—')+'</span><span class="st">'+R.stars(s.avg)+'</span><span>'+s.visits+' visit'+(s.visits!==1?'s':'')+' · '+s.threads+' guest'+(s.threads!==1?'s':'')+'</span>';
    $('deviceNote').textContent = R.hasAPI ? '' : 'Demo mode — reviews are saved on this device only. Connect the Worker to share them with everyone.';
  }); }

  /* deep-link: reviews.html#write focuses the composer */
  if(location.hash==='#write'){ setTimeout(function(){ $('composer').scrollIntoView(); $('f-name').focus(); },300); }
  render(); refreshSummary();
})();
</script>
</body>
</html>
