<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackSilva Quests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden}
    body{font-family:'Oswald',sans-serif;color:#f2f2f4;background:transparent;user-select:none;-webkit-font-smoothing:antialiased}
    :root{--accent:#E8930C;--green:#34d27b;--red:#ef4444;--blue:#48b0ff}

    /* ============ OBIECTIV HUD (stanga sus) ============ */
    #hud{position:fixed;top:22%;left:28px;width:300px;display:none;animation:slideL .35s ease}
    @keyframes slideL{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
    #hud .qtitle{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    #hud .qtitle::before{content:"";width:10px;height:10px;background:var(--accent);transform:rotate(45deg);box-shadow:0 0 12px var(--accent)}
    #hud .obj{display:flex;gap:10px;align-items:flex-start}
    #hud .obj .dot{margin-top:5px;width:9px;height:9px;border:2px solid var(--accent);border-radius:50%;flex:none;box-shadow:0 0 8px var(--accent)}
    #hud .obj .txt{font-size:16px;font-weight:500;line-height:1.3;text-shadow:0 2px 6px rgba(0,0,0,.9)}
    #hud .steps{margin-top:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55)}
    #hud .bar{margin-top:6px;height:4px;width:100%;background:rgba(255,255,255,.12);border-radius:9px;overflow:hidden}
    #hud .bar>i{display:block;height:100%;background:var(--accent);box-shadow:0 0 10px var(--accent);transition:width .4s}

    /* ============ BANNER CINEMATIC (centru) ============ */
    #banner{position:fixed;top:34%;left:0;right:0;text-align:center;display:none;pointer-events:none}
    #banner .bt{font-size:46px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-shadow:0 4px 24px rgba(0,0,0,.9)}
    #banner .bs{margin-top:6px;font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
    #banner.show{display:block;animation:bIn .5s ease, bOut .6s ease 3.4s forwards}
    @keyframes bIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
    @keyframes bOut{to{opacity:0;transform:translateY(-10px)}}

    /* ============ FLASH (toast mic) ============ */
    #flash{position:fixed;top:16%;left:50%;transform:translateX(-50%);display:none;background:rgba(15,15,18,.95);
      border:.5px solid var(--green);color:var(--green);padding:9px 18px;border-radius:9px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;font-size:14px;box-shadow:0 14px 36px -12px rgba(0,0,0,.8)}
    #flash.show{display:block;animation:fIn .3s ease, fOut .4s ease 2s forwards}
    @keyframes fIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1}}
    @keyframes fOut{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}

    /* ============ DIALOG CHAT (jos centru) ============ */
    #dlg{position:fixed;left:50%;bottom:6%;transform:translateX(-50%);width:min(720px,72vw);display:none;z-index:40}
    #dlg.show{display:block;animation:dIn .3s cubic-bezier(.16,1,.3,1)}
    @keyframes dIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%)}}
    #dlg .head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    #dlg .head .av{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:rgba(232,147,12,.16);
      border:.5px solid rgba(232,147,12,.4);color:var(--accent);font-weight:700}
    #dlg .head .nm{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600}
    #dlg .stream{display:flex;flex-direction:column;gap:8px;max-height:38vh;overflow:hidden;padding:4px 2px}
    .bub{max-width:78%;padding:11px 15px;border-radius:14px;font-size:16px;line-height:1.4;letter-spacing:.01em;
      box-shadow:0 10px 28px -16px rgba(0,0,0,.8);animation:bub .25s ease}
    @keyframes bub{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
    .bub.npc{align-self:flex-start;background:linear-gradient(160deg,rgba(28,28,34,.96),rgba(16,16,20,.96));
      border:.5px solid rgba(255,255,255,.12);border-bottom-left-radius:4px}
    .bub.player{align-self:flex-end;background:linear-gradient(160deg,rgba(232,147,12,.95),rgba(190,118,8,.95));
      color:#1a1205;font-weight:500;border-bottom-right-radius:4px}
    .bub .who{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:3px}
    #dlg .foot{margin-top:12px;display:flex;flex-direction:column;gap:8px}
    .choice{text-align:left;background:rgba(20,20,26,.92);border:.5px solid rgba(255,255,255,.14);color:#f2f2f4;
      padding:11px 15px;border-radius:11px;font-family:inherit;font-size:15px;cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:center}
    .choice:hover{border-color:var(--accent);background:rgba(232,147,12,.14);transform:translateX(3px)}
    .choice .n{width:22px;height:22px;flex:none;display:grid;place-items:center;border-radius:6px;background:var(--accent);color:#1a1205;font-weight:700;font-size:12px}
    #dlg .cont{align-self:flex-end;background:var(--accent);color:#1a1205;border:0;padding:9px 18px;border-radius:9px;
      font-family:inherit;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px;cursor:pointer;display:none}
    #dlg .cont.show{display:inline-flex;animation:bub .2s ease}
    .typing::after{content:"▌";color:var(--accent);animation:blink 1s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}

    /* ============ JURNAL (F5) ============ */
    #journal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:60}
    #journal.show{display:flex;animation:bIn .25s ease}
    .jwrap{width:min(560px,90vw);background:linear-gradient(168deg,rgba(19,19,24,.97),rgba(10,10,13,.98));
      border:.5px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;box-shadow:0 30px 70px -30px #000}
    .jwrap::before{content:"";display:block;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
    .jhead{padding:18px 22px 12px;display:flex;justify-content:space-between;align-items:flex-start}
    .jhead h1{margin:0;font-size:22px;letter-spacing:.06em;text-transform:uppercase}
    .jhead .x{font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.4);text-transform:uppercase}
    .jcur{margin:0 22px 14px;padding:14px 16px;border-radius:12px;background:rgba(232,147,12,.08);border:.5px solid rgba(232,147,12,.28)}
    .jcur .t{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600}
    .jcur .d{font-size:14px;color:rgba(255,255,255,.7);margin:6px 0 10px;line-height:1.4}
    .jcur .o{font-size:15px;font-weight:500;display:flex;gap:8px;align-items:center}
    .jcur .o .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
    .jcur .track{margin-top:12px;background:var(--accent);color:#1a1205;border:0;padding:9px 16px;border-radius:9px;
      font-family:inherit;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px;cursor:pointer}
    .jlist{padding:4px 22px 18px;max-height:40vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
    .jlist::-webkit-scrollbar{width:7px}.jlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}
    .jrow{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.06)}
    .jrow.cur{border-color:rgba(232,147,12,.45);background:rgba(232,147,12,.07)}
    .jrow .ic{width:24px;height:24px;flex:none;border-radius:6px;display:grid;place-items:center;font-size:13px;font-weight:700;
      background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
    .jrow.done .ic{background:rgba(52,210,123,.16);color:var(--green)}
    .jrow.cur .ic{background:rgba(232,147,12,.18);color:var(--accent)}
    .jrow .nm{flex:1;font-size:15px;letter-spacing:.02em}
    .jrow .st{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .jrow.done .st{color:var(--green)}.jrow.cur .st{color:var(--accent)}
    .jfoot{padding:12px 22px;border-top:.5px solid rgba(255,255,255,.08);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:right}
  </style>
</head>
<body>
  <!-- Obiectiv HUD -->
  <div id="hud">
    <div class="qtitle" id="hud-title">Misiune</div>
    <div class="obj"><span class="dot"></span><span class="txt" id="hud-obj"></span></div>
    <div class="steps" id="hud-steps"></div>
    <div class="bar"><i id="hud-bar" style="width:0%"></i></div>
  </div>

  <!-- Banner cinematic -->
  <div id="banner"><div class="bt" id="ban-t"></div><div class="bs" id="ban-s"></div></div>

  <!-- Flash -->
  <div id="flash"></div>

  <!-- Dialog -->
  <div id="dlg">
    <div class="head"><div class="av" id="dlg-av">M</div><div class="nm" id="dlg-nm">NPC</div></div>
    <div class="stream" id="dlg-stream"></div>
    <div class="foot" id="dlg-foot">
      <button class="cont" id="dlg-cont">Continua (Enter) ▶</button>
    </div>
  </div>

  <!-- Jurnal -->
  <div id="journal">
    <div class="jwrap">
      <div class="jhead"><h1>Jurnal Misiuni</h1><div class="x">ESC pentru a inchide</div></div>
      <div class="jcur" id="j-cur"></div>
      <div class="jlist" id="j-list"></div>
      <div class="jfoot" id="j-foot"></div>
    </div>
  </div>

  <script>
    const RES = 'blacksilva-missions';
    const post = (n, b) => fetch(`https://${RES}/${n}`, { method:'POST', body: JSON.stringify(b||{}) }).catch(()=>{});
    const $ = id => document.getElementById(id);

    /* -------- HUD -------- */
    function hud(d){
      const el = $('hud');
      if(!d.show){ el.style.display='none'; return; }
      el.style.display='block';
      $('hud-title').textContent = d.title || 'Misiune';
      $('hud-obj').textContent = d.objective || '';
      $('hud-steps').textContent = d.total ? `Pas ${d.step} / ${d.total}` : '';
      $('hud-bar').style.width = d.total ? Math.round((d.step-1)/d.total*100)+'%' : '0%';
    }

    /* -------- Banner -------- */
    function banner(d){
      const el = $('banner');
      $('ban-t').textContent = d.title||''; $('ban-s').textContent = d.sub||'';
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    }

    /* -------- Flash -------- */
    function flash(d){
      const el = $('flash'); el.textContent = d.text||'';
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    }

    /* -------- Dialog -------- */
    let typing = null, canContinue = false, curSpan = null;
    function dlgOpen(npc){
      $('dlg-stream').innerHTML=''; $('dlg-foot').querySelectorAll('.choice').forEach(c=>c.remove());
      $('dlg-cont').classList.remove('show');
      $('dlg-nm').textContent = npc||'NPC';
      $('dlg-av').textContent = (npc||'N').charAt(0).toUpperCase();
      $('dlg').classList.add('show');
    }
    function dlgClose(){ $('dlg').classList.remove('show'); if(typing){clearInterval(typing);typing=null;} curSpan=null; }
    function showContinue(){ canContinue=true; $('dlg-cont').classList.add('show'); }
    function dlgSay(d){
      $('dlg-cont').classList.remove('show'); canContinue=false;
      $('dlg-foot').querySelectorAll('.choice').forEach(c=>c.remove());
      const stream = $('dlg-stream');
      const b = document.createElement('div');
      b.className = 'bub ' + (d.who==='player'?'player':'npc');
      const who = document.createElement('span'); who.className='who'; who.textContent = d.name||'';
      const sp = document.createElement('span'); sp.className='typing';
      b.appendChild(who); b.appendChild(sp); stream.appendChild(b);
      while(stream.children.length>4) stream.removeChild(stream.firstChild); // pastreaza ultimele 4 bule
      const full = d.text||''; sp.dataset.full = full; curSpan = sp;
      let i=0;
      if(typing) clearInterval(typing);
      typing = setInterval(()=>{
        sp.textContent = full.slice(0, ++i);
        if(i>=full.length){ clearInterval(typing); typing=null; sp.classList.remove('typing'); showContinue(); }
      }, 18);
    }
    function dlgChoices(opts){
      $('dlg-cont').classList.remove('show');
      const foot = $('dlg-foot');
      (opts||[]).forEach((t,idx)=>{
        const btn = document.createElement('button');
        btn.className='choice';
        btn.innerHTML = `<span class="n">${idx+1}</span><span>${t}</span>`;
        btn.onclick = ()=>{ foot.querySelectorAll('.choice').forEach(c=>c.remove()); post('dlg_choice',{index:idx+1}); };
        foot.appendChild(btn);
      });
    }
    function advanceDialogue(){
      if(typing){ // primul Enter/click = afiseaza instant tot textul
        clearInterval(typing); typing=null;
        if(curSpan){ curSpan.textContent = curSpan.dataset.full||''; curSpan.classList.remove('typing'); }
        showContinue(); return;
      }
      if(canContinue){ canContinue=false; $('dlg-cont').classList.remove('show'); post('dlg_next'); }
    }
    $('dlg-cont').onclick = advanceDialogue;

    /* -------- Jurnal -------- */
    function journal(d){
      const el = $('journal');
      if(!d.show){ el.classList.remove('show'); return; }
      const cur = $('j-cur');
      if(d.quest){
        cur.style.display='block';
        cur.innerHTML = `<div class="t">Misiunea curenta · #${d.quest.id} ${d.quest.title}</div>
          <div class="d">${d.quest.desc||''}</div>
          <div class="o"><span class="dot"></span>${d.quest.objective||''}</div>
          <button class="track" id="j-track">Seteaza GPS catre obiectiv</button>`;
        cur.querySelector('#j-track').onclick = ()=>post('journal_track');
      } else { cur.style.display='none'; cur.innerHTML=''; }
      const list = $('j-list'); list.innerHTML='';
      let done=0;
      (d.list||[]).forEach(q=>{
        if(q.done) done++;
        const row = document.createElement('div');
        row.className='jrow ' + (q.current?'cur':'') + (q.done?' done':'');
        const st = q.current?'In desfasurare':(q.done?'Completat':'Blocat');
        const ic = q.done?'✓':(q.current?'▶':q.id);
        row.innerHTML = `<div class="ic">${ic}</div><div class="nm">${q.title}</div><div class="st">${st}</div>`;
        list.appendChild(row);
      });
      $('j-foot').textContent = `${done} / ${(d.list||[]).length} misiuni completate`;
      el.classList.add('show');
    }

    /* -------- Router -------- */
    window.addEventListener('message', e=>{
      const d = e.data || {};
      switch(d.action){
        case 'hud': hud(d); break;
        case 'banner': banner(d); break;
        case 'flash': flash(d); break;
        case 'dlg_open': dlgOpen(d.npc); break;
        case 'dlg_say': dlgSay(d); break;
        case 'dlg_choices': dlgChoices(d.options); break;
        case 'dlg_close': dlgClose(); break;
        case 'journal': journal(d); break;
      }
    });

    window.addEventListener('keydown', e=>{
      if($('dlg').classList.contains('show')){
        if(e.key==='Enter'||e.key===' '){ e.preventDefault(); advanceDialogue(); }
        if(['1','2','3','4'].includes(e.key)){
          const btns = $('dlg-foot').querySelectorAll('.choice');
          const idx = parseInt(e.key,10)-1;
          if(btns[idx]) btns[idx].click();
        }
      } else if($('journal').classList.contains('show')){
        if(e.key==='Escape') post('journal_close');
      }
    });
  </script>
</body>
</html>
