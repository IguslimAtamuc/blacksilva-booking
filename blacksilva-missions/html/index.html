<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackSilva Missions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      color: #e8ebe8;
      width: 100vw;
      height: 100vh;
      display: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* Cinematic vignette */
    .cinematic-vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse 60% 70% at 35% 50%,
          transparent 0%,
          transparent 35%,
          rgba(0, 0, 0, 0.15) 50%,
          rgba(0, 0, 0, 0.45) 70%,
          rgba(0, 0, 0, 0.7) 100%);
      animation: vignetteIn 1s ease forwards;
    }

    @keyframes vignetteIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .letterbox-top,
    .letterbox-bottom {
      position: fixed;
      left: 0;
      right: 0;
      height: 0;
      background: #000;
      z-index: 6;
      pointer-events: none;
      transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }
    .letterbox-top.active,
    .letterbox-bottom.active { height: 50px; }

    /* ===== PANOUL CU MISIUNI (dreapta) ===== */
    .panel {
      position: fixed;
      top: 50%;
      right: 3.5vw;
      transform: translateY(-50%);
      width: 420px;
      max-width: 42vw;
      max-height: 80vh;
      z-index: 50;
      display: flex;
      flex-direction: column;
      background: rgba(12, 14, 12, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
      animation: panelIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-50%) translateX(30px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4ADE50;
      box-shadow: 0 0 10px rgba(74, 222, 80, 0.7);
    }

    .panel-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 4px;
      font-weight: 500;
    }

    .panel-stats {
      display: flex;
      gap: 16px;
      margin-top: 14px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 8px 12px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      color: #4ADE50;
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 700;
      margin-top: 2px;
    }

    /* ===== LISTA MISIUNI ===== */
    .mission-list {
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mission-list::-webkit-scrollbar { width: 6px; }
    .mission-list::-webkit-scrollbar-track { background: transparent; }
    .mission-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }

    .mission-card {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 16px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .mission-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .mission-card.completed {
      border-color: rgba(74, 222, 80, 0.35);
      background: rgba(74, 222, 80, 0.06);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .mission-card.completed .card-icon {
      background: rgba(74, 222, 80, 0.15);
      border-color: rgba(74, 222, 80, 0.4);
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-num {
      font-size: 10px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .card-reward {
      font-size: 12px;
      font-weight: 800;
      color: #4ADE50;
      white-space: nowrap;
    }

    .card-desc {
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 6px;
    }

    /* progress bar (Pasul 4) */
    .progress-wrap {
      margin-top: 12px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .progress-status { letter-spacing: 0.4px; }

    .progress-count { color: rgba(255, 255, 255, 0.45); }

    .progress-bar {
      width: 100%;
      height: 7px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
    }

    /* culorile cerute: rosu < 50%, galben >= 50%, verde = 100% */
    .progress-fill.red    { background: linear-gradient(90deg, #ef4444, #f87171); }
    .progress-fill.yellow { background: linear-gradient(90deg, #eab308, #fde047); }
    .progress-fill.green  { background: linear-gradient(90deg, #4ADE50, #22c55e); }

    .status-red    { color: #f87171; }
    .status-yellow { color: #fde047; }
    .status-green  { color: #4ADE50; }

    .card-reward.claimed {
      color: rgba(74, 222, 80, 0.55);
    }

    /* hint jos */
    .hint-text {
      position: fixed;
      bottom: 16px;
      right: 40px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.5px;
      z-index: 60;
    }

    .hint-text kbd {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 5px;
      padding: 3px 7px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
    }

    /* toast de finalizare */
    .toast {
      position: fixed;
      top: 80px;
      left: 35%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 2000;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(12, 14, 12, 0.85);
      border: 1px solid #4ADE50;
      border-radius: 14px;
      padding: 14px 24px;
      box-shadow: 0 0 40px rgba(74, 222, 80, 0.25);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #4ADE50;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .toast-title { font-size: 15px; font-weight: 800; color: #4ADE50; }
    .toast-sub   { font-size: 11px; color: rgba(255, 255, 255, 0.6); margin-top: 2px; }
  </style>
</head>

<body>

  <div class="letterbox-top" id="letterbox-top"></div>
  <div class="letterbox-bottom" id="letterbox-bottom"></div>
  <div class="cinematic-vignette" id="vignette"></div>

  <div class="panel" id="panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <div class="panel-title"><span class="dot"></span> MISIUNI</div>
      </div>
      <div class="panel-sub">Completeaza misiunile pentru bani si experienta</div>
      <div class="panel-stats">
        <div class="stat-box">
          <div class="stat-value" id="stat-completed">0 / 0</div>
          <div class="stat-label">Completate</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-earned">$0</div>
          <div class="stat-label">De castigat</div>
        </div>
      </div>
    </div>

    <div class="mission-list" id="mission-list"></div>
  </div>

  <div class="hint-text"><kbd>ESC</kbd> pentru a inchide</div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <div>
      <div class="toast-title" id="toast-title">Misiune completata!</div>
      <div class="toast-sub" id="toast-sub"></div>
    </div>
  </div>

  <script>
    let missions = [];

    function fmtMoney(n) {
      return '$' + (n || 0).toLocaleString('en-US');
    }

    function colorFor(percent, completed) {
      if (completed || percent >= 100) return 'green';
      if (percent >= 50) return 'yellow';
      return 'red';
    }

    function statusText(percent, completed) {
      if (completed || percent >= 100) return { txt: 'COMPLETAT', cls: 'status-green' };
      if (percent >= 50) return { txt: 'IN PROGRES', cls: 'status-yellow' };
      return { txt: 'INCEPUT', cls: 'status-red' };
    }

    function renderStats() {
      const total = missions.length;
      let done = 0, toEarn = 0;
      missions.forEach(m => {
        if (m.completed) done++;
        else toEarn += (m.reward || 0);
      });
      document.getElementById('stat-completed').textContent = done + ' / ' + total;
      document.getElementById('stat-earned').textContent = fmtMoney(toEarn);
    }

    function render() {
      const list = document.getElementById('mission-list');
      list.innerHTML = '';
      missions.forEach(m => {
        const target = m.target || 1;
        const current = Math.min(m.current || 0, target);
        const percent = m.completed ? 100 : Math.round((current / target) * 100);
        const col = colorFor(percent, m.completed);
        const st = statusText(percent, m.completed);

        const card = document.createElement('div');
        card.className = 'mission-card' + (m.completed ? ' completed' : '');
        card.id = 'mission-' + m.id;
        card.innerHTML = `
          <div class="card-top">
            <div class="card-icon">${m.icon || '★'}</div>
            <div class="card-body">
              <div class="card-title-row">
                <div class="card-title"><span class="card-num">#${m.id}</span> ${m.title}</div>
                <div class="card-reward ${m.completed ? 'claimed' : ''}">${m.completed ? '✓ ' : ''}${fmtMoney(m.reward)}</div>
              </div>
              <div class="card-desc">${m.description || ''}</div>
              <div class="progress-wrap">
                <div class="progress-label">
                  <span class="progress-status ${st.cls}">${st.txt}</span>
                  <span class="progress-count">${current} / ${target}${percent ? '  ·  ' + percent + '%' : ''}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill ${col}" style="width:${percent}%"></div>
                </div>
              </div>
            </div>
          </div>`;
        list.appendChild(card);
      });
      renderStats();
    }

    function updateCard(id, current, target, completed) {
      const m = missions.find(x => x.id === id);
      if (!m) return;
      m.current = current;
      m.target = target;
      m.completed = completed;
      render();
    }

    let toastTimeout;
    function showToast(title, reward) {
      const t = document.getElementById('toast');
      document.getElementById('toast-title').textContent = title + ' — Completat!';
      document.getElementById('toast-sub').textContent = 'Recompensa: ' + fmtMoney(reward);
      clearTimeout(toastTimeout);
      t.classList.add('show');
      toastTimeout = setTimeout(() => t.classList.remove('show'), 4000);
    }

    function openUI() {
      document.body.style.display = 'block';
      document.getElementById('vignette').style.display = 'block';
      setTimeout(() => {
        document.getElementById('letterbox-top').classList.add('active');
        document.getElementById('letterbox-bottom').classList.add('active');
      }, 80);
    }

    function closeUI() {
      document.getElementById('letterbox-top').classList.remove('active');
      document.getElementById('letterbox-bottom').classList.remove('active');
      document.getElementById('vignette').style.display = 'none';
      document.body.style.display = 'none';
    }

    window.addEventListener('message', function (event) {
      const data = event.data;
      if (data.type === 'openUI') {
        missions = data.missions || [];
        render();
        openUI();
      } else if (data.type === 'updateMissions') {
        missions = data.missions || [];
        render();
      } else if (data.type === 'syncMission') {
        updateCard(data.id, data.current, data.target, data.completed);
      } else if (data.type === 'missionCompleted') {
        showToast(data.title, data.reward);
      } else if (data.type === 'closeUI') {
        closeUI();
      }
    });

    window.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeUI();
        fetch('https://blacksilva-missions/close', { method: 'POST', body: JSON.stringify({}) });
      }
    });
  </script>
</body>

</html>
